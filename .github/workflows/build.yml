name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            cli_bin: mei-browser
            gui_bin: mei-browser-gui
          - os: windows-latest
            platform: windows
            cli_bin: mei-browser.exe
            gui_bin: mei-browser-gui.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The GUI binary (Slint + winit + rfd) needs a handful of system dev
      # packages to link on Linux. Windows/macOS don't need any of this,
      # windowing, GL, and file dialogs come from the OS itself.
      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libfontconfig1-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libwayland-dev \
            libgtk-3-dev

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.platform }}

      - name: Build (release, both binaries)
        run: cargo build --release --workspace --bins

      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.cli_bin }}" dist/
          cp "target/release/${{ matrix.gui_bin }}" dist/

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: mei-browser-cli-${{ matrix.platform }}
          path: dist/${{ matrix.cli_bin }}

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: mei-browser-gui-${{ matrix.platform }}
          path: dist/${{ matrix.gui_bin }}
